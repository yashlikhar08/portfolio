server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve static files when they exist, otherwise fall back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Caching for static assets
  location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|ttf|woff2?)$ {
    try_files $uri =404;
    access_log off;
    expires 30d;
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
  }
}
